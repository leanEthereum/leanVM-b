# Credit: https://github.com/succinctlabs/flock (flock-prover), MIT OR Apache-2.0.
# Vendored BLAKE3 subset of flock's `flock-prover` crate — the BLAKE3
# per-block encoder and its stacked reduction. Builds against the vendored
# `flock-core` (= the `flare` snapshot leanVM-b already uses), so the packed
# F128 witness shares leanVM-b's field type. De-workspaced (own empty
# [workspace]) so it is not auto-included as a workspace member; leanVM-b uses
# it purely as a path dependency.
[package]
name = "flock-prover"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Succinct Labs", "Benedikt Bunz", "William Wang"]
description = "Vendored BLAKE3 R1CS prover subset for the Flock PIOP."

[lib]
name = "flock_prover"
path = "src/lib.rs"

[dependencies]
flock-core = { path = "../flock-core" }
rayon = "1.10"

[dev-dependencies]
# Reference implementation the compress_matches_* tests check against.
blake3 = "1.5"

# Own (empty) workspace, so this vendored crate is NOT auto-included as a member
# of leanVM-b's workspace.
[workspace]
