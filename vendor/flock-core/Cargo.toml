# Credit: https://github.com/succinctlabs/flock (flock-core), MIT OR Apache-2.0.
# Vendored snapshot of flock's `flock-core` crate (the GF(2^128) field, additive
# NTT, Merkle, BaseFold/Ligerito PCS, and the shared Fiat–Shamir sponge). Vendored so
# leanVM-b does not depend on the external `../binary-fields/flock` tree, which
# changes underneath us. De-workspaced: the workspace-inherited values are
# inlined from flock's root Cargo.toml.
[package]
name = "flock-core"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Succinct Labs", "Benedikt Bunz", "William Wang"]
description = "Vendored protocol library and verifier for the Flock PIOP."

[dependencies]
rayon = "1.10"
blake3 = "1.5"
serde = { version = "1", features = ["derive"] }

# Own (empty) workspace, so this vendored crate is NOT auto-included as a member
# of leanVM-b's workspace — leanVM-b uses it purely as a path dependency and
# `cargo test` there builds only its library, not its test suite.
[workspace]
